<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Internship Form</h1>

    <form>

        <div class="row">
            <div class="field">
                <label for="first-name-input">First Name</label>
                <input type="text" id="first-name-input" required>
                <small>First name required!</small>
            </div>

            <div class="field">
                <label for="last-name-input">Last Name</label>
                <input type="text" id="last-name-input" required>
                <small>Last name required!</small>
            </div>

            <div class="field">
                <label for="email-input">Email Address</label>
                <input type="email" id="email-input" placeholder="xyz@abc.com" required>
                <small>Email required!</small>
            </div>
        </div>

        <div class="row">
            <div class="field college">
                <label for="college-input">College</label>
                <input type="text" id="college-input" required>
                <small>Please provide a valid college.</small>
            </div>

            <div class="field">
                <label>Graduation Year</label>
                <select required>
                    <option value="">Choose...</option>
                    <option>2020</option>
                    <option>2021</option>
                    <option>2022</option>
                    <option>2023</option>
                </select>
                <small>Please select a valid Graduation Year.</small>
            </div>

            <div class="field">
                <label for="roll-no-input">Roll No.</label>
                <input type="text" id="roll-no-input" required>
                <small>Please provide a valid Roll no.</small>
            </div>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="conditions-checkbox" required>
            <label for="conditions-checkbox">Agree to terms and conditions</label>
            <small>You must agree before submitting.</small>
        </div>

        <button type="submit">Submit form</button>

    </form>
</div>

</body>
</html>
